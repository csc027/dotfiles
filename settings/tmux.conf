# colors
BLACK='#000000'
BLUE='#3b78ff'
DARK_GRAY='#454545'
GRAY='#777777'
GREEN='#3baa3b'
LIGHT_GRAY='#bbbbbb'
WHITE='#ffffff'

# layouts
CUSTOM_LAYOUT_1='3e96,382x77,0,0{114x77,0,0,2,267x77,115,0,1}]'
CUSTOM_LAYOUT_2='2b03,382x77,0,0{114x77,0,0,2,267x77,115,0[267x58,115,0,1,267x18,115,59,7]}'
CUSTOM_LAYOUT_3='ca04,382x77,0,0{114x77,0,0[114x38,0,0,2,114x38,0,39,8],267x77,115,0[267x58,115,0,1,267x18,115,59,7]}'

# reload shorcut
unbind-key r
bind-key r source-file ~/.tmux.conf\; display-message 'Reloaded tmux configuration'

# prefix key
unbind-key 'M-\'
set-option -g prefix 'M-\'

# general settings
set-option -g base-index 1
set-option -g escape-time 0
set-option -g mode-keys vi
set-option -g mouse on
set-option -g pane-base-index 1
set-option -g renumber-windows on

# copy mode
bind-key 'y' copy-mode
bind-key 'M-y' copy-mode
unbind-key -T copy-mode-vi 'v'
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel

# make home and end work
bind-key -n End send Escape "OF"
bind-key -n Home send Escape "OH"

# window control
bind-key -n 'M-t' new-window
bind-key -n 'M-u' confirm-before -p "kill-window #W? (y/n)" kill-window
bind-key -n 'M-U' kill-window
bind-key -n 'M-n' next-window
bind-key -n 'M-p' previous-window
bind-key -n 'M-s' split-window -v
bind-key -n 'M-S' split-window -v -b
bind-key -n 'M-v' split-window -h -b
bind-key -n 'M-V' split-window -h

# pane control
bind-key 'M-\' select-pane -t :.+
bind-key -n 'M-h' select-pane -L
bind-key -n 'M-j' select-pane -D
bind-key -n 'M-k' select-pane -U
bind-key -n 'M-l' select-pane -R
bind-key -n 'M-<' resize-pane -L
bind-key -n 'M--' resize-pane -D
bind-key -n 'M-+' resize-pane -U
bind-key -n 'M->' resize-pane -R
bind-key -n 'M-x' confirm-before -p "kill-pane #T? (y/n)" kill-pane
bind-key -n 'M-X' kill-pane

# info popups and panes
bind-key -n 'M-w' split-window -v -l 30% -c "#{pane_current_path}"
bind-key -n 'M-W' display-popup -y 100% -w 100% -h 30% -d "#{pane_current_path}"
bind-key -n 'M-q' split-window -h -b -l 30% -c "#{pane_current_path}"
bind-key -n 'M-Q' display-popup -x 0 -w 30% -h 100% -d "#{pane_current_path}"

# application window
bind-key -n 'M-e' command-prompt -p 'Open application: ' -T 'command' "new-window '%%'"
bind-key -n 'M-E' command-prompt -p 'Open application: ' -T 'command' "new-window '%% && bash -i'"

# color options
set-option -g default-terminal "${TERM}"
set-option -g terminal-overrides ",*:RGB"

# interactive selection
bind-key -n 'M-b' run-shell 'max_session_length=$(tmux list-session -F "##{session_name}" | wc --max-line-length); max_window_length=$(tmux list-session -F "##{window_name}" | wc --max-line-length); i=0; for session in $(tmux list-session -F "##{session_name}"); do if [ "$session" = "#{session_name}" ]; then break; fi; i=$((i+1)); done; tmux run-shell "tmux display-menu -C \"$i\" -T \"#[align=centre][ Select a session ]\" ##{S:\"##{p$max_session_length:##{session_name}} | ##{p$max_window_length:##{window_name}} (##{session_windows} windows) ##{?session_attached,●,}\" \"##{session_name}\" \"switch-client -t ##{session_name}\" } \"##{p$max_session_length:} | New Session\" \"+\" \"new-session\" \"##{p$max_session_length:} | Delete Session\" \"x\" '\''display-menu -T \"#[align=centre][ Select a session ]\" #{S:\"#{p$max_session_length:#{session_name}} | #{window_name} (#{session_windows} windows) #{?session_attached,●,}\" \"\" \"kill-session -t #{session_name}\" }'\''"'
bind-key -n 'M-f' run-shell -C 'display-menu -T "#[align=centre][ Select a window ]" #{W:"#{window_index}: #{window_name} #{?window_active,●,}" "#{window_index}" "switch-client -t #{window_id}" }'
bind-key -n 'M-m' run-shell -C 'display-menu -T "#[align=centre][ Select a layout ]" "Layout 1 (2 panes)" "1" "select-layout \"$CUSTOM_LAYOUT_1\"" "Layout 2 (3 panes)" "2" "select-layout \"$CUSTOM_LAYOUT_2\"" "Layout 3 (4 panes)" "3" "select-layout \"$CUSTOM_LAYOUT_3\""'

# styling
set-option -g status-position top
set-option -g message-style "fg=$WHITE,bg=$BLUE"
set-option -g menu-selected-style "fg=$WHITE,bg=$BLUE"
set-option -g menu-style "fg=$GRAY,bg=$BLACK"
set-option -g mode-style "fg=$WHITE,bg=$BLUE"
set-option -w -g pane-border-style "fg=$DARK_GRAY"
set-option -w -g pane-active-border-style "fg=$BLUE"
set-option -w -g status-left ''
set-option -w -g status-right "#{?client_prefix, #[fg=$BLUE] ● ,}#[fg=$WHITE,bg=$BLUE] Session #[fg=$LIGHT_GRAY,bg=$BLACK] #{session_name} "
set-option -w -g status-style "bg=$BLACK"
set-option -w -g status-left-style "bg=$BLACK"
set-option -w -g status-right-style "bg=$BLACK"
set-option -w -g window-status-style "fg=$GRAY,bg=$BLACK"
set-option -w -g window-status-current-format "#[fg=$WHITE,bg=$BLUE] #{window_index} #[fg=$LIGHT_GRAY,bg=$BLACK] #{window_name} "
set-option -w -g window-status-format "#[fg=$BLACK,bg=$DARK_GRAY] #{window_index} #[fg=$GRAY,bg=$BLACK] #{window_name} "
set-option -w -g window-status-separator ""

# nested configuration
bind-key -T root 'F12' \
	set-option prefix None \;\
	set-option key-table off \;\
	set-option status-right "#[fg=$GREEN,bg=$BLACK] x #[fg=$WHITE,bg=$GREEN] Session #[fg=$LIGHT_GRAY,bg=$BLACK] #{session_name} " \;\
	set-option window-status-current-format "#[fg=$WHITE,bg=$GREEN] #{window_index} #[fg=$LIGHT_GRAY,bg=$BLACK] #{window_name} " \;\
	set-option window-status-format "#[fg=$BLACK,bg=$DARK_GRAY] #{window_index} #[fg=$GRAY,bg=$BLACK] #{window_name} "

bind-key -T off 'F12' \
	set-option -u prefix \;\
	set-option -u key-table \;\
	set-option -u status-right \;\
	set-option -u window-status-current-format \;\
	set-option -u window-status-format
