# reload shorcut
unbind-key r
bind-key r source-file ~/.tmux.conf\; display-message 'Reloaded tmux configuration'

# prefix key
unbind-key 'M-\'
set-option -g prefix 'M-\'

# general settings
set-option -g base-index 1
set-option -g escape-time 0
set-option -g mode-keys vi
set-option -g mouse on
set-option -g pane-base-index 1
set-option -g renumber-windows on

# copy mode
bind-key 'y' copy-mode
bind-key 'M-y' copy-mode
unbind-key -T copy-mode-vi 'v'
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel

# make home and end work
bind-key -n End send Escape "OF"
bind-key -n Home send Escape "OH"

# window control
bind-key -n 'M-t' new-window
bind-key -n 'M-u' kill-window
bind-key -n 'M-n' next-window
bind-key -n 'M-p' previous-window
bind-key -n 'M-s' split-window -v
bind-key -n 'M-S' split-window -v -b
bind-key -n 'M-v' split-window -h -b
bind-key -n 'M-V' split-window -h

# pane control
bind-key 'M-\' select-pane -t :.+
bind-key -n 'M-h' select-pane -L
bind-key -n 'M-j' select-pane -D
bind-key -n 'M-k' select-pane -U
bind-key -n 'M-l' select-pane -R
bind-key -n 'M-<' resize-pane -L
bind-key -n 'M--' resize-pane -D
bind-key -n 'M-+' resize-pane -U
bind-key -n 'M->' resize-pane -R
bind-key -n 'M-x' kill-pane

# info popups and panes
bind-key -n 'M-w' split-window -v -l 30% -c "#{pane_current_path}"
bind-key -n 'M-W' display-popup -y 100% -w 100% -h 30% -d "#{pane_current_path}"
bind-key -n 'M-q' split-window -h -b -l 30% -c "#{pane_current_path}"
bind-key -n 'M-Q' display-popup -x 0 -w 30% -h 100% -d "#{pane_current_path}"

# application window
bind-key -n 'M-e' command-prompt -p 'Open application: ' -T 'command' "new-window '%%'"
bind-key -n 'M-E' command-prompt -p 'Open application: ' -T 'command' "new-window '%% && bash -i'"

# colors
BLACK='#000000'
BLUE='#3b78ff'
DARK_GRAY='#454545'
GRAY='#777777'
LIGHT_GRAY='#bbbbbb'
WHITE='#ffffff'

# color options
set-option -g default-terminal "${TERM}"
set-option -sg terminal-overrides ",*:RGB"

# interactive selection
bind-key -n 'M-b' choose-tree -Z

# styling
set-option -g status-position top
set-window-option -g pane-border-style "fg=$DARK_GRAY"
set-window-option -g pane-active-border-style "fg=$BLUE"
set-window-option -g status-left ''
set-window-option -g status-right "#[fg=$WHITE,bg=$BLUE] Session #[fg=$LIGHT_GRAY,bg=$BLACK] #{session_name} "
set-window-option -g status-style "bg=$BLACK"
set-window-option -g status-left-style "bg=$BLACK"
set-window-option -g status-right-style "bg=$BLACK"
set-window-option -g window-status-style "fg=$GRAY,bg=$BLACK"
set-window-option -g window-status-current-format "#[fg=$WHITE,bg=$BLUE] #{window_index} #[fg=$LIGHT_GRAY,bg=$BLACK] #{window_name}"
set-window-option -g window-status-format "#[fg=$BLACK,bg=$DARK_GRAY] #{window_index} #[fg=$GRAY,bg=$BLACK] #{window_name}"
